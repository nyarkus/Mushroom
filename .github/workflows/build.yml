name: "godot-ci export"
on:
  push:
    branches: [ master, dev ]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.1
  EXPORT_NAME: mushroom
  PROJECT_PATH: .

jobs:
  export-windows:
    name: Windows Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:mono-4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono
      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Windows Desktop" "$EXPORT_DIR/windows/$EXPORT_NAME.exe"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows

  export-linux:
    name: Linux Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:mono-4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono
      - name: Linux Build
        run: |
          mkdir -v -p build/linux
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Linux" "$EXPORT_DIR/linux/$EXPORT_NAME.x86_64"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/linux

  testing-linux:
    name: Linux testing
    runs-on: ubuntu-latest
    needs: [export-linux]
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: build/linux
      -  name: Startup test
         run: |
           cd build/linux
           chmod +x ${{ env.EXPORT_NAME }}.x86_64

           echo "Starting test with 30s timeout..."
           set +e
           timeout 30 ./${{ env.EXPORT_NAME }}.x86_64 --headless --quit
           EXIT_CODE=$?
           set -e

           if [ $EXIT_CODE -eq 0 ]; then
             echo "✅ Game started and exited with 0 code"
             exit 0
           elif [ $EXIT_CODE -eq 124 ]; then
             echo "❌ Game timed out!"
             exit 1
           else
             echo "❌ Game crashed with exit code $EXIT_CODE"
             exit 1
           fi

  deploy-itchio:
    name: Deploy to Itch.io
    runs-on: ubuntu-latest
    needs: [export-windows, export-linux, testing-linux]
    steps:
      - name: Setup butler
        run: |
          wget https://raw.githubusercontent.com/abarichello/godot-ci/refs/heads/master/getbutler.sh
          chmod +x getbutler.sh
          ./getbutler.sh
          echo "$(pwd)" >> $GITHUB_PATH
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: build/windows
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: build/linux
      - name: Deploy to Itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCHIO_USERNAME: ${{ vars.ITCHIO_USERNAME }}
          ITCHIO_GAME: ${{ vars.ITCHIO_GAME }}
        run: |
          butler push build/windows $ITCHIO_USERNAME/$ITCHIO_GAME:windows-${{ env.SUFFIX }} --ignore '*.pdb'
          butler push build/linux $ITCHIO_USERNAME/$ITCHIO_GAME:linux-${{ env.SUFFIX }} --ignore '*.pdb'
